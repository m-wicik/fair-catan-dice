<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catan Dice Alternative</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    button {
        background-color: black;
        border-color: white;
        border-style: solid;
        border-width: 4px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        width: 140px;
        height: 50px;
        color: white;
    }

    #dice_roll {
        display: none;
        background-color: black;
        border-color: white;
        border-style: solid;
        border-width: 6px;
        border-radius: 12px;
        font-size: 160px;
        width: 240px;
        height: 240px;
        color: white;
        justify-content: center;
        align-items: center;
        cursor: pointer;
    }

    #available_numbers {
        display: none;
        margin-bottom: 60px;
        gap: 2px;
        margin-top: 2px;
    }

    .cell {
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-family: sans-serif;
        font-size: 12px;
    }

    .used {
        color: #444;
        border-color: #222;
        text-decoration: line-through;
    }

    #choices_remaining {
        display: none;
        margin-bottom: 60px;
        justify-content: center;
        align-items: center;
        color: white;
        font-family: sans-serif;
        font-size: 12px;
    }
</style>
</head>
<body>

<button id="classic_button" style="margin-bottom: 30px;">Classic Mode</button>
<button id="mystery_button">Mystery Mode</button>
<div id="dice_roll" style="margin-bottom: 60px;">?</div>
<div id="available_numbers"></div>
<div id="choices_remaining"></div>
<button id="end_game_button" style="display:none;">End Game</button>

<script src="script.js"></script>

</body>
</html>
